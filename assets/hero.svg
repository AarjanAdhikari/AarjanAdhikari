<svg width="1600" height="760" viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="760">
<stop offset="0%" stop-color="#050505"/>
<stop offset="100%" stop-color="#000000"/>
</linearGradient>

<radialGradient id="glow1" cx="50%" cy="25%" r="70%">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
</radialGradient>

<linearGradient id="lineFade">

<stop offset="0%" stop-color="#000000"/>

<stop offset="50%" stop-color="#353535"/>

<stop offset="100%" stop-color="#000000"/>

</linearGradient>

<filter id="softBlur">
<feGaussianBlur stdDeviation="90"/>
</filter>

<linearGradient id="edgeGlow" x1="0" y1="0" x2="1600" y2="760">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
    <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.035"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
</linearGradient>

<filter id="tinyBlur">
    <feGaussianBlur stdDeviation="14"/>
</filter>
  
</defs>

<rect
width="1600"
height="760"
fill="url(#edgeGlow)"
opacity="0.18"/>

  <!-- Soft moving highlight -->

<ellipse
cx="820"
cy="210"
rx="240"
ry="90"
fill="white"
opacity="0.05"
filter="url(#tinyBlur)">

    <animate attributeName="cx"
        values="760;840;760"
        dur="12s"
        repeatCount="indefinite"/>

</ellipse>

<!-- Ambient Light -->

<circle cx="800" cy="180" r="260"
fill="white"
opacity="0.08"
filter="url(#softBlur)">

<animate attributeName="opacity"
values="0.04;0.08;0.04"
dur="10s"
repeatCount="indefinite"/>

</circle>

<rect width="1600"
height="760"
fill="url(#glow1)"/>

<!-- Grid -->

<g opacity="0.06">

<path d="M0 100H1600" stroke="url(#lineFade)"/>
<path d="M0 200H1600" stroke="url(#lineFade)"/>
<path d="M0 300H1600" stroke="url(#lineFade)"/>
<path d="M0 400H1600" stroke="url(#lineFade)"/>
<path d="M0 500H1600" stroke="url(#lineFade)"/>
<path d="M0 600H1600" stroke="url(#lineFade)"/>

<path d="M200 0V760" stroke="url(#lineFade)"/>
<path d="M400 0V760" stroke="url(#lineFade)"/>
<path d="M600 0V760" stroke="url(#lineFade)"/>
<path d="M800 0V760" stroke="url(#lineFade)"/>
<path d="M1000 0V760" stroke="url(#lineFade)"/>
<path d="M1200 0V760" stroke="url(#lineFade)"/>
<path d="M1400 0V760" stroke="url(#lineFade)"/>

</g>

<!-- Corner accents -->

<g opacity="0.18">

<line x1="90" y1="90" x2="180" y2="90" stroke="#FFFFFF"/>
<line x1="90" y1="90" x2="90" y2="180" stroke="#FFFFFF"/>

<line x1="1510" y1="90" x2="1420" y2="90" stroke="#FFFFFF"/>
<line x1="1510" y1="90" x2="1510" y2="180" stroke="#FFFFFF"/>

<line x1="90" y1="670" x2="180" y2="670" stroke="#FFFFFF"/>
<line x1="90" y1="670" x2="90" y2="580" stroke="#FFFFFF"/>

<line x1="1510" y1="670" x2="1420" y2="670" stroke="#FFFFFF"/>
<line x1="1510" y1="670" x2="1510" y2="580" stroke="#FFFFFF"/>

</g>
  
<!-- Small Label -->

<text
x="800"
y="170"
fill="#8E8E8E"
font-size="18"
font-family="Inter,Arial"
text-anchor="middle"
letter-spacing="8">

SOFTWARE ENGINEER • PRODUCT BUILDER

</text>

<!-- Title -->

<text
x="800"
y="320"
fill="white"
font-size="118"
font-weight="700"
font-family="Inter,Arial,Helvetica,sans-serif"
letter-spacing="14"
text-anchor="middle">

AARJAN

<animate
attributeName="opacity"
values="0.96;1;0.96"
dur="8s"
repeatCount="indefinite"/>

</text>

<!-- Subtitle -->

<text
x="800"
y="390"
fill="#A5A5A5"
font-size="28"
font-family="Inter,Arial"
text-anchor="middle">

Building intelligent software for everyday life.

</text>

<circle
cx="800"
cy="430"
r="1.5"
fill="#FFFFFF">

<animate
attributeName="opacity"
values="0.25;1;0.25"
dur="3s"
repeatCount="indefinite"/>

</circle>
    
<!-- Divider -->

<line
x1="630"
y1="470"
x2="970"
y2="470"
stroke="#2F2F2F"
stroke-width="1"/>

<circle
cx="800"
cy="470"
r="2"
fill="#FFFFFF">

<animate
attributeName="r"
values="2;3;2"
dur="4s"
repeatCount="indefinite"/>

</circle>

<!-- Bottom -->
<text
x="250"
y="645"
fill="#454545"
font-size="13"
font-family="Inter,Arial"
letter-spacing="4">

EST. 2026

</text>

<text
x="1350"
y="645"
fill="#454545"
font-size="13"
text-anchor="end"
font-family="Inter,Arial"
letter-spacing="4">

KATHMANDU · NP

</text>

<text
x="800"
y="560"
fill="#686868"
font-size="18"
font-family="Inter,Arial"
letter-spacing="10"
text-anchor="middle">

AI SYSTEMS · PRODUCT ENGINEERING · DESIGN

</text>

<!-- Edge vignette -->

<rect
width="1600"
height="760"
fill="url(#edgeGlow)"
opacity="0.75"/>
  
</svg>
