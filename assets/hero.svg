<svg width="1600" height="820" viewBox="0 0 1600 820" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="820">
<stop offset="0%" stop-color="#050505"/>
<stop offset="100%" stop-color="#000000"/>
</linearGradient>


<radialGradient id="glow1">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
</radialGradient>


<linearGradient id="lineFade">
<stop offset="0%" stop-color="#000000"/>
<stop offset="50%" stop-color="#353535"/>
<stop offset="100%" stop-color="#000000"/>
</linearGradient>


<linearGradient id="sweep">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
<stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>


<filter id="blur">
<feGaussianBlur stdDeviation="90"/>
</filter>


<filter id="smallBlur">
<feGaussianBlur stdDeviation="20"/>
</filter>


</defs>



<!-- BACKGROUND -->

<rect width="1600" height="820" fill="url(#bg)"/>



<!-- MOVING LIGHT SWEEP -->

<rect
x="-500"
y="0"
width="400"
height="820"
fill="url(#sweep)"
opacity="0.4">

<animate
attributeName="x"
from="-500"
to="1700"
dur="8s"
repeatCount="indefinite"/>

</rect>



<!-- AMBIENT GLOW -->

<circle
cx="800"
cy="180"
r="260"
fill="white"
opacity="0.06"
filter="url(#blur)">

<animate
attributeName="opacity"
values="0.04;0.1;0.04"
dur="8s"
repeatCount="indefinite"/>

</circle>



<!-- GRID -->

<g opacity="0.06">

<g>

<path d="M0 100H1600" stroke="url(#lineFade)"/>
<path d="M0 200H1600" stroke="url(#lineFade)"/>
<path d="M0 300H1600" stroke="url(#lineFade)"/>
<path d="M0 400H1600" stroke="url(#lineFade)"/>
<path d="M0 500H1600" stroke="url(#lineFade)"/>
<path d="M0 600H1600" stroke="url(#lineFade)"/>

<path d="M200 0V760" stroke="url(#lineFade)"/>
<path d="M400 0V760" stroke="url(#lineFade)"/>
<path d="M600 0V760" stroke="url(#lineFade)"/>
<path d="M800 0V760" stroke="url(#lineFade)"/>
<path d="M1000 0V760" stroke="url(#lineFade)"/>
<path d="M1200 0V760" stroke="url(#lineFade)"/>
<path d="M1400 0V760" stroke="url(#lineFade)"/>


<animateTransform
attributeName="transform"
type="translate"
from="0 0"
to="0 15"
dur="12s"
repeatCount="indefinite"/>

</g>

</g>




<!-- CORNER ACCENTS -->

<g opacity="0.18">

<animate
attributeName="opacity"
values="0.12;0.3;0.12"
dur="5s"
repeatCount="indefinite"/>


<line x1="90" y1="90" x2="180" y2="90" stroke="#FFFFFF"/>
<line x1="90" y1="90" x2="90" y2="180" stroke="#FFFFFF"/>

<line x1="1510" y1="90" x2="1420" y2="90" stroke="#FFFFFF"/>
<line x1="1510" y1="90" x2="1510" y2="180" stroke="#FFFFFF"/>

<line x1="90" y1="670" x2="180" y2="670" stroke="#FFFFFF"/>
<line x1="90" y1="670" x2="90" y2="580" stroke="#FFFFFF"/>

<line x1="1510" y1="670" x2="1420" y2="670" stroke="#FFFFFF"/>
<line x1="1510" y1="670" x2="1510" y2="580" stroke="#FFFFFF"/>

</g>




<!-- LABEL -->

<text
x="800"
y="170"
fill="#8E8E8E"
font-size="18"
font-family="Inter,Arial"
text-anchor="middle"
letter-spacing="8">

AI &amp; ML • SOFTWARE DEVELOPMENT

</text>




<!-- NAME -->

<text
x="800"
y="320"
fill="white"
font-size="118"
font-weight="700"
font-family="Inter,Arial"
letter-spacing="14"
text-anchor="middle">

AARJAN

<animate
attributeName="opacity"
values="0.8;1;0.8"
dur="6s"
repeatCount="indefinite"/>

</text>




<!-- SUBTITLE -->

<text
x="800"
y="390"
fill="#A5A5A5"
font-size="28"
font-family="Arial"
text-anchor="middle">

Building AI/ML and software products from idea to execution.

<animate
attributeName="opacity"
from="0"
to="1"
dur="3s"
fill="freeze"/>

</text>




<!-- CENTER DOT -->

<circle
cx="800"
cy="480"
r="2"
fill="white">

<animate
attributeName="r"
values="2;6;2"
dur="4s"
repeatCount="indefinite"/>

</circle>




<!-- DIVIDER -->

<line
x1="630"
y1="520"
x2="970"
y2="520"
stroke="#2F2F2F"/>


<circle
cx="800"
cy="520"
r="2"
fill="white">

<animate
attributeName="r"
values="2;4;2"
dur="3s"
repeatCount="indefinite"/>

</circle>





<!-- FOOT -->

<text
x="250"
y="700"
fill="#454545"
font-size="13"
font-family="Arial"
letter-spacing="4">

aarjanadhikari.com.np

</text>


<text
x="1350"
y="700"
fill="#454545"
font-size="13"
text-anchor="end"
font-family="Inter"
letter-spacing="4">

KATHMANDU · NP

</text>



<text
x="800"
y="610"
fill="#686868"
font-size="18"
font-family="Inter"
letter-spacing="10"
text-anchor="middle">

AI · ENGINEERING · PRODUCTS

</text>




<!-- BOTTOM DIVIDER -->

<line
x1="220"
y1="735"
x2="720"
y2="735"
stroke="#2A2A2A"/>


<circle
cx="800"
cy="735"
r="3"
fill="#FFFFFF">

<animate
attributeName="opacity"
values="0.2;1;0.2"
dur="3s"
repeatCount="indefinite"/>

</circle>


<line
x1="880"
y1="735"
x2="1380"
y2="735"
stroke="#2A2A2A"/>


</svg>
