<svg width="1600" height="560" viewBox="0 0 1600 560" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="560">
<stop offset="0%" stop-color="#000000"/>
<stop offset="100%" stop-color="#050505"/>
</linearGradient>


<!-- Border scanning light -->

<linearGradient id="borderGlow">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
<stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
</linearGradient>


<!-- Tag glow -->

<filter id="softGlow">
<feGaussianBlur stdDeviation="8"/>
</filter>


</defs>



<!-- BACKGROUND -->

<rect width="1600" height="560" fill="url(#bg)"/>



<!-- TITLE -->

<text 
x="800"
y="90"
fill="#FFFFFF"
font-size="36"
font-family="Arial, Helvetica, sans-serif"
font-weight="700"
text-anchor="middle">

SELECTED WORK

<animate
attributeName="opacity"
values="0.85;1;0.85"
dur="5s"
repeatCount="indefinite"/>

</text>





<!-- LEFT CARD BASE -->

<rect
x="110"
y="150"
width="640"
height="280"
rx="22"
fill="#070707"
stroke="#2A2A2A"/>


<!-- RIGHT CARD BASE -->

<rect
x="850"
y="150"
width="640"
height="280"
rx="22"
fill="#070707"
stroke="#2A2A2A"/>





<!-- CARD LIGHT SCAN -->

<rect
x="110"
y="150"
width="640"
height="2"
fill="url(#borderGlow)">

<animate
attributeName="x"
from="110"
to="750"
dur="5s"
repeatCount="indefinite"/>

</rect>


<rect
x="850"
y="150"
width="640"
height="2"
fill="url(#borderGlow)">

<animate
attributeName="x"
from="850"
to="1490"
dur="5s"
repeatCount="indefinite"/>

</rect>





