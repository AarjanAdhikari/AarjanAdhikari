name: Generate Monochrome Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # This exact output string forces the snake to be white and the grid to be shades of black/grey
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#000000,#111111,#222222,#333333,#444444
            
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
