name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: AarjanAdhikari

          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23FFFFFF&color_dots=%23000000,%231A1A1A,%23333333,%23666666,%23999999

      - name: Add black background
        run: |
          sed -i 's/<svg/<svg style="background:#000000"/' dist/github-contribution-grid-snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
